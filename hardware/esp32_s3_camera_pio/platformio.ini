; ============================================================
; PlatformIO Project - Hệ thống quản lý sân bóng rổ
; Board: ESP32-S3 N16R8 (16MB Flash, 8MB OPI PSRAM) với camera tích hợp
; ============================================================

[env:esp32-s3-n16r8]
platform = espressif32
; Board esp32s3box mặc định hỗ trợ chuẩn 16MB Flash / 8MB OPI PSRAM
board = esp32s3box
framework = arduino

; Cổng nạp - comment/bỏ comment tuỳ cổng COM của bạn
; upload_port = COM3

; Tốc độ
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
upload_speed  = 115200

upload_flags =
    --before=default_reset
    --after=hard_reset

; ============ QUAN TRỌNG: Cấu hình Flash & PSRAM ============
board_build.arduino.memory_type = qio_opi   ; Bật OPI PSRAM (bắt buộc cho N16R8)
board_upload.flash_size         = 16MB
board_build.partitions          = default_16MB.csv

; ============ Build flags ============
build_flags =
    ; -- Camera --
    -D BOARD_HAS_PSRAM

    ; -- MQTT --
    -D MQTT_MAX_PACKET_SIZE=512

; ============ Thư viện ============
lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    knolleary/PubSubClient @ ^2.8

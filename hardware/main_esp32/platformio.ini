; PlatformIO Project Configuration
; Hệ thống quản lý sân bóng rổ - ESP32

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Thư viện cần thiết
lib_deps = 
    tzapu/WiFiManager @ ^2.0.17
    knolleary/PubSubClient @ ^2.8
    madhephaestus/ESP32Servo @ ^3.0.5
    bodmer/TFT_eSPI @ ^2.5.43
    ricmoo/qrcode @ ^0.0.1

; Cấu hình TFT_eSPI cho màn hình ST7789 1.54 inch (240x240)
build_flags = 
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_CS=5
    -D TFT_DC=16
    -D TFT_RST=17
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D SPI_FREQUENCY=40000000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
